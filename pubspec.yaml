name: smartcast
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0
  equatable: ^2.0.5
  dio: ^5.4.0
  sqflite: ^2.3.0
  path: ^1.9.0
  intl: ^0.20.2
  get_it: ^7.6.0
  dartz: ^0.10.1
  uuid: ^4.0.0
  shared_preferences: ^2.2.2
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  flutter_blue_plus: ^1.31.10
  permission_handler: ^11.3.1
  universal_ble: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.6

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/LoadingScreen.jpg
    - assets/images/page1Image.jpg
    - assets/images/page2image.jpg
